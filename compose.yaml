# Create your compose file. To learn more, please visit
# https://docs.docker.com/reference/compose-file/
services:
  cosmos-reason2-8b:
    image: nvcr.io/nim/nvidia/cosmos-reason2-8b:1.6.0
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    ports:
      - "8000:8000"

    # IMPORTANT:
    # Workbench "Variables" can provide NVIDIA_API_KEY; we map it into the container as NGC_API_KEY
    environment:
      NGC_API_KEY: ${NVIDIA_API_KEY}

      # These settings attempt to reduce KV-cache pressure for vLLM-style backends.
      # They may or may not help depending on which profiles exist in the NIM manifest.
      NIM_MAX_MODEL_LEN: "8192"
      NIM_MAX_NUM_SEQS: "1"
      NIM_KVCACHE_PERCENT: "0.50"

    volumes:
      - type: bind
        source: ./nim_cache
        target: /opt/nim/.cache/

    networks:
      - app-network

    profiles:
      - cosmos-reason2-8b

networks:
  app-network:
    driver: bridge

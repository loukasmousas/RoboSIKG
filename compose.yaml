# Create your compose file. To learn more, please visit
# https://docs.docker.com/reference/compose-file/
services:
  cosmos-reason2-8b:
    image: nvcr.io/nim/nvidia/cosmos-reason2-8b:1.6.0
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    ports:
      - "8000:8000"

    volumes:
      - nim_cache:/opt/nim/.cache

    # Workbench Environment Variables:
    # You store NVIDIA_API_KEY in the UI (sensitive),
    # but the NIM container expects NGC_API_KEY.
    environment:
      - NGC_API_KEY=${NVIDIA_API_KEY:?Set NVIDIA_API_KEY in AI Workbench Environment Variables}

    shm_size: "16gb"

    profiles:
      - cosmos-reason2-8b

volumes:
  nim_cache: {}

networks:
  app-network:
    driver: bridge
